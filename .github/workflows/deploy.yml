name: Deploy notification-relay

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Sync files to Pi path
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./ /opt/docker/notification-relay/

      - name: Restart relay
        run: |
          cd /opt/docker/notification-relay
          sudo docker compose up -d
